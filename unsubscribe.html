<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수신거부 | 이머전트</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a; --ink-2:#555; --ink-3:#8c8c8c;
    --line:#dcdcdc; --accent:#222;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:rgba(0,0,0,.45);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;padding:18px;
    -webkit-font-smoothing:antialiased;
  }
  .modal{
    background:#fff;width:100%;max-width:380px;border:1px solid var(--line);
    border-radius:4px;padding:30px 26px;text-align:center;
    box-shadow:0 20px 50px -18px rgba(0,0,0,.4);
  }
  .modal h3{font-size:18px;font-weight:700;}
  .modal p{font-size:13.5px;color:var(--ink-3);margin-top:8px;line-height:1.6;}
  .modal button{
    margin-top:22px;width:100%;font-family:inherit;font-size:14px;font-weight:500;
    padding:12px;border-radius:3px;cursor:pointer;
    background:var(--accent);color:#fff;border:1px solid var(--accent);
    transition:background .15s ease;
  }
  .modal button:hover{background:#000;}
</style>
</head>
<body>
  <div class="modal" role="dialog" aria-modal="true">
    <h3>수신거부 처리되었습니다</h3>
    <p id="msg">앞으로 안내 메일을 보내드리지 않습니다.</p>
    <button type="button" id="okBtn">확인</button>
  </div>

<script>
  document.getElementById('okBtn').addEventListener('click', function(){
    // 스크립트로 연 창이면 바로 닫힘
    window.open('', '_self');
    window.close();
    // 브라우저가 닫기를 막은 경우 안내
    setTimeout(function(){
      document.getElementById('msg').textContent = '이 창(탭)을 닫아주셔도 됩니다.';
      this && (this.style.display = 'none');
      document.getElementById('okBtn').style.display = 'none';
    }.bind(this), 250);
  });
</script>
</body>
</html>
